<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreeCraft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }

    /* ── Overlay pause ────────────────────────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; cursor: pointer; z-index: 10;
    }
    #overlay h1 { font-size: 56px; letter-spacing: 4px; margin-bottom: 12px; }
    #overlay p  { font-size: 18px; opacity: 0.7; }

    /* ── Réticule Minecraft (croix avec gap au centre) ────────────────────── */
    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; user-select: none;
      width: 0; height: 0;
    }
    #crosshair::before, #crosshair::after {
      content: ''; position: absolute;
      background: rgba(255,255,255,0.90);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.50);
    }
    /* barre horizontale */
    #crosshair::before {
      width: 20px; height: 2px;
      left: -10px; top: -1px;
    }
    /* barre verticale */
    #crosshair::after {
      width: 2px; height: 20px;
      left: -1px; top: -10px;
    }

    /* ── Vignette permanente (coins sombres) ──────────────────────────────── */
    #vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 50%,
        transparent 55%, rgba(0,0,0,0.52) 100%);
      pointer-events: none; z-index: 4;
    }

    /* ── Flash rouge sur dégâts ───────────────────────────────────────────── */
    #damage-flash {
      position: fixed; inset: 0;
      background: rgba(200,0,0,0);
      pointer-events: none; z-index: 5;
      opacity: 0;
    }

    /* ── Barres santé / faim ──────────────────────────────────────────────── */
    #bars {
      position: fixed; bottom: 82px; left: 50%;
      transform: translateX(-50%);
      image-rendering: pixelated; pointer-events: none;
    }

    /* ── Hotbar ───────────────────────────────────────────────────────────── */
    #hotbar {
      position: fixed; bottom: 16px; left: 50%;
      transform: translateX(-50%);
      image-rendering: pixelated; pointer-events: none;
    }

    /* ── Nom du bloc sélectionné ──────────────────────────────────────────── */
    #hud {
      position: fixed; bottom: 76px; right: calc(50% - 240px);
      background: rgba(0,0,0,0.55);
      color: #fff; font-size: 12px;
      padding: 3px 10px; border-radius: 4px;
      pointer-events: none;
    }

    /* ── Debug ────────────────────────────────────────────────────────────── */
    #debug {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0,0,0,0.5);
      color: #0f0; font-size: 12px;
      padding: 6px 12px; border-radius: 4px;
      pointer-events: none;
    }

    /* ── Minimap ──────────────────────────────────────────────────────────── */
    #minimap {
      position: fixed; top: 10px; right: 10px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.40);
      box-shadow: 0 0 14px rgba(0,0,0,0.75);
      image-rendering: pixelated; pointer-events: none;
    }

    /* ── Overlay inventaire ───────────────────────────────────────────────── */
    #inv-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      align-items: center; justify-content: center;
      z-index: 20;
    }
    #inv-canvas { image-rendering: pixelated; border-radius: 6px; cursor: default; }
  </style>
</head>
<body>
  <!-- Menu principal -->
  <div id="menu-overlay" style="position:fixed;inset:0;z-index:50;">
    <canvas id="menu-canvas" style="display:block;"></canvas>
  </div>

  <!-- Pause / reprendre -->
  <div id="overlay" style="display:none;">
    <h1>ThreeCraft</h1>
    <p>Cliquez pour reprendre</p>
  </div>

  <!-- HUD éléments -->
  <div id="vignette"></div>
  <div id="damage-flash"></div>
  <div id="crosshair"></div>
  <canvas id="bars"></canvas>
  <canvas id="hotbar"></canvas>
  <div id="hud">—</div>
  <div id="debug">pos: 0 0 0</div>
  <canvas id="minimap"></canvas>

  <!-- Inventaire -->
  <div id="inv-overlay">
    <canvas id="inv-canvas"></canvas>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
