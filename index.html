<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ThreeCraft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: monospace; }
    canvas { display: block; }

    #overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.75);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      color: #fff; cursor: pointer; z-index: 10;
    }
    #overlay h1 { font-size: 56px; letter-spacing: 4px; margin-bottom: 12px; }
    #overlay p  { font-size: 18px; opacity: 0.7; }

    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: #fff; font-size: 28px; line-height: 1;
      pointer-events: none; user-select: none;
      text-shadow: 0 0 4px #000;
    }

    #hud {
      position: fixed; bottom: 20px; left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff; font-size: 13px;
      padding: 7px 18px; border-radius: 6px;
      pointer-events: none;
    }

    #debug {
      position: fixed; top: 10px; left: 10px;
      background: rgba(0,0,0,0.5);
      color: #0f0; font-size: 12px;
      padding: 6px 12px; border-radius: 4px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="overlay">
    <h1>ThreeCraft</h1>
    <p>Cliquez pour jouer</p>
  </div>
  <div id="crosshair">+</div>
  <div id="hud">Bloc : GRASS | WASD déplacement | Espace saut | Clic gauche casser | Clic droit poser | Molette changer de bloc</div>
  <div id="debug">pos: 0 0 0</div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
